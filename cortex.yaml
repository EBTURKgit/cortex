        prompt: ""
        tools: []
    frontend:
        enabled: false
        model: default
        prompt: ""
        tools: []
    manager:
        enabled: false
        model: default
        prompt: ""
        tools: []
    qa:
        enabled: false
        model: default
        prompt: ""
        tools: []
llm:
    default:
        provider: ollama
        model: codellama:7b
        api_key: ""
        endpoint: http://localhost:11434
