name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Lint
        run: go vet ./...

      - name: Unit Tests
        run: go test ./internal/graph/... -v -count=1

      - name: Integration Tests
        run: go test ./tests/... -v -count=1

      - name: Build
        run: go build -o bin/cortex .

      - name: Cross-compile
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/cortex-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o bin/cortex-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o bin/cortex-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o bin/cortex-windows-amd64.exe .
